services:
  - type: web
    runtime: node
    name: ai-talk-battle
    repo: https://github.com/cody-labs-ai/ai-talk-battle
    branch: master
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
